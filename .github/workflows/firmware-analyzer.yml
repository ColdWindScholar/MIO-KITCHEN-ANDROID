name: Firmware Analyzer

on:
  push:
    paths:
      - 'common/src/main/java/com/omarea/common/firmware/**'
      - 'common/src/test/java/com/omarea/common/firmware/**'
      - 'common/build.gradle'
      - 'tools/check-firmware-analyzer.py'
      - 'docs/**'
      - '.github/workflows/firmware-analyzer.yml'
  pull_request:
    paths:
      - 'common/src/main/java/com/omarea/common/firmware/**'
      - 'common/src/test/java/com/omarea/common/firmware/**'
      - 'common/build.gradle'
      - 'tools/check-firmware-analyzer.py'
      - 'docs/**'
      - '.github/workflows/firmware-analyzer.yml'

jobs:
  validate-firmware-analyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate firmware analyzer architecture
        run: python3 tools/check-firmware-analyzer.py
