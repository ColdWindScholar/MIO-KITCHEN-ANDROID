name: Runtime Profiles

on:
  push:
    paths:
      - 'common/src/main/java/com/omarea/common/runtime/**'
      - 'common/src/main/java/com/omarea/common/toolchain/**'
      - 'common/src/main/java/com/omarea/common/operations/**'
      - 'common/src/test/java/com/omarea/common/runtime/**'
      - 'common/src/test/java/com/omarea/common/toolchain/**'
      - 'common/src/test/java/com/omarea/common/operations/**'
      - 'common/build.gradle'
      - 'pio/src/main/assets/toolchain/**'
      - 'tools/check-runtime-profiles.py'
      - 'tools/check-architecture.py'
      - 'docs/**'
      - '.github/workflows/runtime-profiles.yml'
  pull_request:
    paths:
      - 'common/src/main/java/com/omarea/common/runtime/**'
      - 'common/src/main/java/com/omarea/common/toolchain/**'
      - 'common/src/main/java/com/omarea/common/operations/**'
      - 'common/src/test/java/com/omarea/common/runtime/**'
      - 'common/src/test/java/com/omarea/common/toolchain/**'
      - 'common/src/test/java/com/omarea/common/operations/**'
      - 'common/build.gradle'
      - 'pio/src/main/assets/toolchain/**'
      - 'tools/check-runtime-profiles.py'
      - 'tools/check-architecture.py'
      - 'docs/**'
      - '.github/workflows/runtime-profiles.yml'

jobs:
  validate-runtime-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate runtime profiles architecture
        run: python3 tools/check-runtime-profiles.py
