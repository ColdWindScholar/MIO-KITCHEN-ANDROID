name: Toolchain Installer

on:
  push:
    paths:
      - 'common/src/main/java/com/omarea/common/toolchain/**'
      - 'common/src/test/java/com/omarea/common/toolchain/**'
      - 'pio/src/main/assets/toolchain/**'
      - 'pio/src/main/java/com/mio/kitchen/FirmwareOperationService.kt'
      - 'krscript/src/main/java/com/omarea/krscript/runtime/LegacyShellBridge.kt'
      - 'common/build.gradle'
      - 'pio/build.gradle'
      - 'tools/check-toolchain-installer.py'
      - 'tools/check-final-cleanup.py'
      - 'tools/compute-tool-hashes.py'
      - 'docs/**'
      - '.github/workflows/toolchain-installer.yml'
  pull_request:
    paths:
      - 'common/src/main/java/com/omarea/common/toolchain/**'
      - 'common/src/test/java/com/omarea/common/toolchain/**'
      - 'pio/src/main/assets/toolchain/**'
      - 'pio/src/main/java/com/mio/kitchen/FirmwareOperationService.kt'
      - 'krscript/src/main/java/com/omarea/krscript/runtime/LegacyShellBridge.kt'
      - 'common/build.gradle'
      - 'pio/build.gradle'
      - 'tools/check-toolchain-installer.py'
      - 'tools/check-final-cleanup.py'
      - 'tools/compute-tool-hashes.py'
      - 'docs/**'
      - '.github/workflows/toolchain-installer.yml'

jobs:
  validate-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate ToolchainInstaller architecture
        run: python3 tools/check-toolchain-installer.py
      - name: Validate final cleanup (manifest + installToolkit)
        run: python3 tools/check-final-cleanup.py
      - name: Verify manifest SHA-256 values are present
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('pio/src/main/assets/toolchain/manifest.json'))
          nulls = [t['name'] for t in m['tools'] if t.get('sha256') is None]
          if nulls:
              # lpunpack and simg2img are intentionally null (not shipped).
              # All other tools must have a real hash.
              unexpected = [n for n in nulls if n not in ('lpunpack', 'simg2img')]
              if unexpected:
                  print(f'FAIL: tools missing SHA-256: {unexpected}')
                  sys.exit(1)
          print(f'PASS: all shipped tools have SHA-256 (nulls allowed for: lpunpack, simg2img)')
          "
