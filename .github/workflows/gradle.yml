name: Build APK and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Leave empty to bump patch automatically, for example 2.0.1 -> 2.0.2"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APK_BASENAME: MIO-KITCHEN
  RELEASE_TIMEZONE: Europe/Riga

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android platform
      run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Resolve release version
      id: version
      shell: bash
      env:
        REQUESTED_VERSION: ${{ github.event.inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        CURRENT_VERSION=$(grep -oP 'versionName\s+["'"'"']\K[^"'"'"']+' pio/build.gradle | head -n 1)

        if [ -n "${REQUESTED_VERSION}" ]; then
          RELEASE_VERSION="${REQUESTED_VERSION#v}"
        else
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          BASE_VERSION="${LATEST_TAG#v}"

          if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BASE_VERSION="$CURRENT_VERSION"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          RELEASE_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
        fi

        if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Version must use semantic format: X.Y.Z" >&2
          exit 1
        fi

        IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"

        if [ "$PATCH" -gt 999 ]; then
          echo "Patch version must be lower than 1000 because versionCode uses YYMMDDPPP format" >&2
          exit 1
        fi

        RELEASE_DATE=$(TZ="${RELEASE_TIMEZONE}" date +%d%m%y)
        VERSION_CODE_DATE=$(TZ="${RELEASE_TIMEZONE}" date +%y%m%d)
        VERSION_CODE=$((10#$VERSION_CODE_DATE * 1000 + 10#$PATCH))
        APK_NAME="${APK_BASENAME}-${RELEASE_DATE}-${RELEASE_VERSION}.apk"
        RELEASE_TAG="v${RELEASE_VERSION}"
        RELEASE_TITLE="Release ${RELEASE_VERSION}"

        export RELEASE_VERSION VERSION_CODE

        python3 - <<'PY'
        import os
        import re
        from pathlib import Path

        release_version = os.environ["RELEASE_VERSION"]
        version_code = os.environ["VERSION_CODE"]

        p = Path("pio/build.gradle")
        s = p.read_text()
        s = re.sub(r'versionName\s+["\'][^"\']+["\']', f"versionName '{release_version}'", s, count=1)
        s = re.sub(r'versionCode\s+\d+', f'versionCode {version_code}', s, count=1)
        p.write_text(s)
        PY

        echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
        echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
        echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
        echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
        echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
        echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

        echo "Resolved version: $RELEASE_VERSION"
        echo "Version code: $VERSION_CODE"
        echo "Release date: $RELEASE_DATE"
        echo "APK name: $APK_NAME"
        echo "Release title: $RELEASE_TITLE"

    - name: Validate project quality gates
      run: |
        python3 tools/validate-localization.py
        python3 tools/check-known-regressions.py
        python3 tools/check-build-modernization.py
        python3 tools/check-storage-workspace.py
        bash -n pio/src/main/assets/script/tool.sh

    - name: Check release signing secrets
      id: secrets
      env:
        MIO_RELEASE_STORE_BASE64: ${{ secrets.MIO_RELEASE_STORE_BASE64 }}
        MIO_RELEASE_STORE_PASSWORD: ${{ secrets.MIO_RELEASE_STORE_PASSWORD }}
        MIO_RELEASE_KEY_ALIAS: ${{ secrets.MIO_RELEASE_KEY_ALIAS }}
        MIO_RELEASE_KEY_PASSWORD: ${{ secrets.MIO_RELEASE_KEY_PASSWORD }}
      run: |
        if [ -n "${MIO_RELEASE_STORE_BASE64}" ] && [ -n "${MIO_RELEASE_STORE_PASSWORD}" ] && [ -n "${MIO_RELEASE_KEY_ALIAS}" ] && [ -n "${MIO_RELEASE_KEY_PASSWORD}" ]; then
          echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          echo "Release signing secrets are present — will build a properly signed release APK."
        else
          echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          echo "WARNING: Release signing secrets are NOT set."
          echo "The APK will be signed with the debug key."
          echo "This is fine for testing but NOT suitable for Play Store or distribution."
          echo ""
          echo "To enable release signing, add these GitHub repository secrets:"
          echo "  MIO_RELEASE_STORE_BASE64    — base64-encoded .jks keystore file"
          echo "  MIO_RELEASE_STORE_PASSWORD  — keystore password"
          echo "  MIO_RELEASE_KEY_ALIAS       — key alias (e.g. mio-kitchen)"
          echo "  MIO_RELEASE_KEY_PASSWORD    — key password"
          echo ""
          echo "To create a keystore locally:"
          echo '  keytool -genkey -v -keystore mio-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias mio-kitchen -storepass <password> -keypass <password> -dname "CN=MIO Kitchen, O=MIO Kitchen, C=US"'
          echo "  # Then base64-encode it:"
          echo "  # Linux/macOS:  base64 -w 0 mio-release.jks"
          echo "  # Windows PS:   [Convert]::ToBase64String([IO.File]::ReadAllBytes('mio-release.jks'))"
        fi

    - name: Decode release keystore
      if: steps.secrets.outputs.has_secrets == 'true'
      env:
        MIO_RELEASE_STORE_BASE64: ${{ secrets.MIO_RELEASE_STORE_BASE64 }}
      run: |
        set -euo pipefail
        echo "${MIO_RELEASE_STORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/mio-release.jks"
        test -s "$RUNNER_TEMP/mio-release.jks"

    - name: Build release APK
      env:
        MIO_RELEASE_STORE_PASSWORD: ${{ secrets.MIO_RELEASE_STORE_PASSWORD }}
        MIO_RELEASE_KEY_ALIAS: ${{ secrets.MIO_RELEASE_KEY_ALIAS }}
        MIO_RELEASE_KEY_PASSWORD: ${{ secrets.MIO_RELEASE_KEY_PASSWORD }}
      run: |
        GRADLE_ARGS="clean :pio:assembleRelease -PapkReleaseDate=${{ steps.version.outputs.release_date }}"

        if [ "${{ steps.secrets.outputs.has_secrets }}" = "true" ]; then
          GRADLE_ARGS="$GRADLE_ARGS -PMIO_RELEASE_STORE_FILE=$RUNNER_TEMP/mio-release.jks -PMIO_RELEASE_STORE_PASSWORD=$MIO_RELEASE_STORE_PASSWORD -PMIO_RELEASE_KEY_ALIAS=$MIO_RELEASE_KEY_ALIAS -PMIO_RELEASE_KEY_PASSWORD=$MIO_RELEASE_KEY_PASSWORD"
          echo "Building SIGNED release APK..."
        else
          echo "Building DEBUG-SIGNED release APK (no signing secrets)..."
        fi

        ./gradlew $GRADLE_ARGS --no-daemon

    - name: Prepare release APK
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p release-apk
        APK_FILE=$(find pio/build/outputs/apk/release -type f -name '*.apk' ! -name '*unsigned*' -print -quit)
        test -n "$APK_FILE"
        cp "$APK_FILE" "release-apk/${{ steps.version.outputs.apk_name }}"
        ls -lah release-apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_BASENAME }}-${{ steps.version.outputs.release_date }}-${{ steps.version.outputs.release_version }}
        path: release-apk/*.apk
        if-no-files-found: error

    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        gh release create "${{ steps.version.outputs.release_tag }}" release-apk/*.apk \
          --target "$GITHUB_SHA" \
          --title "${{ steps.version.outputs.release_title }}" \
          --notes "Automated APK build. Version: ${{ steps.version.outputs.release_version }}. APK: ${{ steps.version.outputs.apk_name }}. Commit: $GITHUB_SHA"
