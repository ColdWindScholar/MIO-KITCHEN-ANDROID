name: Shell Runtime

on:
  push:
    paths:
      - 'common/src/main/java/com/omarea/common/shell/runtime/**'
      - 'common/src/test/java/com/omarea/common/shell/runtime/**'
      - 'common/build.gradle'
      - 'tools/check-shell-runtime.py'
      - 'docs/**'
      - '.github/workflows/shell-runtime.yml'
  pull_request:
    paths:
      - 'common/src/main/java/com/omarea/common/shell/runtime/**'
      - 'common/src/test/java/com/omarea/common/shell/runtime/**'
      - 'common/build.gradle'
      - 'tools/check-shell-runtime.py'
      - 'docs/**'
      - '.github/workflows/shell-runtime.yml'

jobs:
  validate-shell-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate shell runtime architecture
        run: python3 tools/check-shell-runtime.py
