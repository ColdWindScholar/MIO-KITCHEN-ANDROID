name: Build Quality

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate localization resources
        run: python3 tools/validate-localization.py
      - name: Check known critical regressions
        run: python3 tools/check-known-regressions.py
      - name: Check build modernization baseline
        run: python3 tools/check-build-modernization.py
      - name: Check storage/workspace baseline
        run: python3 tools/check-storage-workspace.py
      - name: Check shell syntax
        run: bash -n pio/src/main/assets/script/tool.sh

  assemble-debug:
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Assemble debug APK
        run: ./gradlew :pio:assembleDebug --no-daemon
