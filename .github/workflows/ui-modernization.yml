name: UI Modernization

on:
  push:
    paths:
      - 'common/src/main/java/com/omarea/common/ui/UiState.kt'
      - 'pio/src/main/java/com/mio/kitchen/ui/modern/**'
      - 'pio/src/test/java/com/mio/kitchen/ui/modern/**'
      - 'pio/build.gradle'
      - 'tools/check-ui-modernization.py'
      - 'docs/**'
      - '.github/workflows/ui-modernization.yml'
  pull_request:
    paths:
      - 'common/src/main/java/com/omarea/common/ui/UiState.kt'
      - 'pio/src/main/java/com/mio/kitchen/ui/modern/**'
      - 'pio/src/test/java/com/mio/kitchen/ui/modern/**'
      - 'pio/build.gradle'
      - 'tools/check-ui-modernization.py'
      - 'docs/**'
      - '.github/workflows/ui-modernization.yml'

jobs:
  validate-ui-modernization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate UI modernization layer
        run: python3 tools/check-ui-modernization.py
