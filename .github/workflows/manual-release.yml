name: Manual Android Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release name
        required: false
        default: MIO-KITCHEN Android

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean :pio:build --no-daemon

      - name: Collect APK
        run: |
          mkdir -p release-apk
          find pio/build/outputs/apk -type f -name '*.apk' -print -exec cp {} release-apk/ \;
          ls -lah release-apk
          test -n "$(find release-apk -type f -name '*.apk' -print -quit)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIO-KITCHEN-ANDROID-apk
          path: release-apk/*.apk
          if-no-files-found: error

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: build-${{ github.run_number }}
          RELEASE_NAME: ${{ inputs.release_name }} ${{ github.run_number }}
        run: |
          gh release create "$RELEASE_TAG" release-apk/*.apk \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "Automated APK build from master. Commit: $GITHUB_SHA"
