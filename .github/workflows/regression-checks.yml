name: Regression Checks

on:
  push:
  pull_request:

jobs:
  known-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate localization resources
        run: python3 tools/validate-localization.py
      - name: Check known critical regressions
        run: python3 tools/check-known-regressions.py
      - name: Check shell syntax
        run: bash -n pio/src/main/assets/script/tool.sh
